# .github/workflows/pages.yml — Deploy site/ to GitHub Pages
# Copy this file to each repo's .github/workflows/ directory.
#
# NOTE: Consumers (wheat, mill, silo, farmer, harvest, orchard, grainulation)
# should replicate the "Vendor shared assets" step — it invokes the
# @grainulation/barn sync-assets CLI to copy shared SEO/print primitives
# (grainulation-print.css, grainulation-tokens.css, status-icons.svg) into
# the site/ dir BEFORE upload, so CSP `default-src 'self'` stays strict.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "public/**"
      - "tools/sync-assets.js"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Vendor shared assets (sync-assets)
        run: node tools/sync-assets.js --target ./site --verbose

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
