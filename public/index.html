<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>barn</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0e1a'/><path d='M32,3.84 L18.18,3.84 C8.04,13.98 8.04,45.52 18.18,60.16 L32,60.16' fill='none' stroke='%23e11d48' stroke-width='1.28' stroke-linecap='round' stroke-linejoin='round'/><text x='32' y='33' text-anchor='middle' dominant-baseline='central' fill='%23e11d48' font-family='-apple-system,system-ui,sans-serif' font-size='24' font-weight='700'>B</text></svg>">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1e293b;
    --border: rgba(255,255,255,0.08);
    --accent: #e11d48;
    --accent-light: #fb7185;
    --accent-dim: rgba(225,29,72,0.12);
    --text: #e8ecf1;
    --muted: #94a3b8;
    --dim: #64748b;
    --green: #22c55e;
    --orange: #f59e0b;
    --purple: #a78bfa;
    --blue: #3b82f6;
    --blue-light: #60a5fa;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout: two columns ── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  /* ── Toolbar ── */
  .toolbar {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
  }
  .toolbar-brand {
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .toolbar-sprint {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg3);
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .toolbar-sprint .phase {
    color: var(--blue-light);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 9px;
    letter-spacing: 0.06em;
    margin-inline-end: 6px;
  }
  .toolbar-count {
    font-size: 11px;
    color: var(--dim);
    margin-inline-start: auto;
  }
  .toolbar-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .toolbar-refresh:hover { color: var(--text); border-color: var(--muted); }

  /* ── Sidebar (template list) ── */
  .sidebar {
    background: var(--bg2);
    border-inline-end: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }

  .sidebar-header {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    padding: 8px 8px 6px;
  }

  .template-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .template-card:hover { border-color: var(--accent-dim); background: rgba(225,29,72,0.04); }
  .template-card.active { border-color: var(--accent); background: rgba(225,29,72,0.06); }
  .template-card .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .template-card .desc {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .template-card .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .template-card .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg2);
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .template-card .tag.feature { color: var(--blue-light); background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.15); }

  /* ── Sprint section ── */
  .sprint-section {
    margin-top: 8px;
  }
  .sprint-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 6px;
  }
  .sprint-card.active { border-inline-start: 3px solid var(--green); }
  .sprint-card .sprint-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }
  .sprint-card .sprint-meta {
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }
  .sprint-card .sprint-meta .phase-tag {
    color: var(--blue-light);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── Main (preview) ── */
  .main {
    overflow-y: auto;
    background: var(--bg);
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--dim);
    gap: 8px;
  }
  .preview-empty .icon { font-size: 40px; opacity: 0.3; }
  .preview-empty .text { font-size: 13px; }

  .preview-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .preview-header .title { font-size: 15px; font-weight: 700; }
  .preview-header .badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--accent-dim);
    color: var(--accent-light);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .preview-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 24px;
  }
  .preview-tab {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    background: none;
    border-top: none;
    border-inline-start: none;
    border-inline-end: none;
  }
  .preview-tab:hover { color: var(--muted); }
  .preview-tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

  .preview-content {
    padding: 0;
    height: calc(100vh - 48px - 56px - 36px);
  }

  /* Source view */
  .source-view {
    padding: 20px 24px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--muted);
    white-space: pre-wrap;
    overflow-y: auto;
    height: 100%;
    tab-size: 2;
  }
  .source-view .line-num {
    display: inline-block;
    width: 36px;
    text-align: end;
    color: var(--dim);
    margin-inline-end: 16px;
    user-select: none;
    opacity: 0.5;
  }
  .source-view .placeholder { color: var(--orange); font-weight: 600; }
  .source-view .comment { color: var(--dim); font-style: italic; }
  .source-view .tag { color: var(--accent-light); }
  .source-view .attr { color: var(--purple); }
  .source-view .str { color: var(--green); }

  /* Rendered preview */
  .render-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  /* Info panel */
  .info-panel {
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }
  .info-panel h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .info-row .label { color: var(--dim); }
  .info-row .value { color: var(--text); font-weight: 500; }
  .placeholder-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .placeholder-tag {
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    background: rgba(245,158,11,0.1);
    color: var(--orange);
    border-radius: 4px;
    border: 1px solid rgba(245,158,11,0.2);
  }

  /* ── Connection indicator ── */
  .conn-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .conn-dot.disconnected { background: var(--accent); }
  .reconnect-banner { position:fixed;top:0;left:0;right:0;z-index:9999;padding:8px 16px;background:#92400e;color:#fbbf24;font-size:12px;text-align:center;transform:translateY(-100%);transition:transform .3s;font-family:system-ui,sans-serif }
  .reconnect-banner.visible { transform:translateY(0) }
  .reconnect-banner button { background:none;border:1px solid #fbbf24;color:#fbbf24;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin-inline-start:8px }

  /* ── Mobile nav ── */
  .mobile-nav {
    display: none;
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .mobile-nav-bar {
    display: flex;
  }
  .mobile-tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
  }
  .mobile-tab:hover { color: var(--muted); }
  .mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── A11y ── */
  .skip-link{position:absolute;top:-40px;inset-inline-start:0;background:var(--accent);color:#fff;padding:8px 16px;z-index:10000;font-size:14px;font-weight:600;transition:top .2s}
  .skip-link:focus{top:0}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 48px auto 1fr;
    }
    .mobile-nav { display: block; grid-row: 2; }
    .sidebar { grid-row: 3; display: none; }
    .main { grid-row: 3; }
    .sidebar.mobile-visible { display: block; }
    .main.mobile-hidden { display: none; }
    .toolbar .toolbar-sprint { display: none; }
  }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="live-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<div class="reconnect-banner" id="reconnectBanner" role="status" aria-live="polite"></div>
<div class="app">
  <!-- Toolbar -->
  <header class="toolbar" role="banner">
    <span class="toolbar-brand"><svg width="57" height="44" viewBox="0 0 62 38" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle"><path d="M22,6 L15.5,6 C9.5,11.5 9.5,26.5 15.5,32 L22,32" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><text x="22.5" y="19" text-anchor="middle" dominant-baseline="central" fill="#e11d48" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="800">B</text><text x="28.5" y="19" dominant-baseline="central" fill="#e8ecf1" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="800">arn</text></svg></span>
    <span id="sprintBadge" class="toolbar-sprint"></span>
    <span id="templateCount" class="toolbar-count"></span>
    <button class="toolbar-refresh" onclick="refresh()">refresh</button>
    <span class="conn-dot" id="connDot"></span>
  </header>

  <!-- Mobile nav -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <div class="mobile-nav-bar">
      <button class="mobile-tab active" data-panel="preview" onclick="switchMobilePanel('preview')">Preview</button>
      <button class="mobile-tab" data-panel="templates" onclick="switchMobilePanel('templates')">Templates</button>
    </div>
  </nav>

  <!-- Sidebar: template list + sprints -->
  <aside class="sidebar" id="sidebar" role="complementary" aria-label="Sidebar"></aside>

  <!-- Main: preview pane -->
  <main class="main" id="main-content" aria-label="Barn workspace">
    <div class="preview-empty">
      <div class="icon">B</div>
      <div class="text" id="preview-empty-text">select a template to preview</div>
    </div>
  </main>
</div>

<script>
// ── i18n passthrough ──
const t = (s, v) => v ? s.replace(/\{(\w+)\}/g, (_, k) => v[k] ?? k) : s;

let state = { templates: [], sprints: [], activeSprint: null, manifest: null };
let selected = null;
let activeTab = 'source';
let sse = null;

// ── SSE connection ──────────────────────────────────────────────────────────

let retryCount = 0;
function showBanner(count) {
  const b = document.getElementById('reconnectBanner');
  if (count > 5) {
    b.innerHTML = t('Connection lost.') + ' <button onclick="retryCount=0;connect()">' + t('Retry now') + '</button>';
  } else if (count > 1) {
    b.textContent = t('Reconnecting (attempt {count})...', { count });
  } else {
    b.textContent = t('Reconnecting...');
  }
  b.classList.add('visible');
}
function hideBanner() { document.getElementById('reconnectBanner').classList.remove('visible'); }

function connect() {
  sse = new EventSource('/events');
  sse.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        state = msg.data;
        render();
        const ls = document.getElementById('live-status');
        if (ls) ls.textContent = t('Updated: {count} templates loaded', { count: (state.templates || []).length });
      }
    } catch {}
  };
  sse.onopen = () => {
    retryCount = 0;
    hideBanner();
    document.getElementById('connDot').classList.remove('disconnected');
  };
  sse.onerror = () => {
    document.getElementById('connDot').classList.add('disconnected');
    sse.close();
    const delay = Math.min(30000, 1000 * Math.pow(2, retryCount)) + Math.random() * 1000;
    retryCount++;
    showBanner(retryCount);
    setTimeout(connect, delay);
  };
}

async function refresh() {
  try {
    const resp = await fetch('/api/refresh', { method: 'POST' });
    state = await resp.json();
    render();
  } catch {}
}

// ── Rendering ───────────────────────────────────────────────────────────────

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(1) + ' KB';
}

function render() {
  renderToolbar();
  renderSidebar();
  renderMain();
}

function renderToolbar() {
  const badge = document.getElementById('sprintBadge');
  if (state.activeSprint) {
    const s = state.activeSprint;
    badge.innerHTML = `<span class="phase">${esc(s.phase)}</span>${esc(s.name || s.question || '').substring(0, 50)}`;
  } else {
    badge.textContent = t('no active sprint');
  }
  document.getElementById('templateCount').textContent = t('{count} templates', { count: state.templates.length });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-header">' + t('Templates') + '</div>';

  for (const tpl of state.templates) {
    const isActive = selected === tpl.name;
    html += `<div class="template-card ${isActive ? 'active' : ''}" onclick="selectTemplate('${esc(tpl.name)}')">
      <div class="name">${esc(tpl.name)}</div>
      ${tpl.description ? `<div class="desc">${esc(tpl.description)}</div>` : ''}
      <div class="meta">
        <span class="tag">${tpl.lines} lines</span>
        <span class="tag">${formatBytes(tpl.size)}</span>
        ${tpl.features.map(f => `<span class="tag feature">${esc(f)}</span>`).join('')}
      </div>
    </div>`;
  }

  if (state.sprints.length > 0) {
    html += '<div class="sidebar-header" style="margin-top:16px">' + t('Sprints') + '</div>';
    for (const s of state.sprints) {
      const isActive = s.status === 'active';
      html += `<div class="sprint-card ${isActive ? 'active' : ''}">
        <div class="sprint-name">${esc(s.name || 'unnamed')}</div>
        <div class="sprint-meta">
          <span class="phase-tag">${esc(s.phase)}</span>
          <span>${s.claims_count || 0} claims</span>
        </div>
      </div>`;
    }
  }

  sidebar.innerHTML = html;
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (!selected) {
    main.innerHTML = `<div class="preview-empty">
      <div class="icon">B</div>
      <div class="text">${t('select a template to preview')}</div>
    </div>`;
    return;
  }

  const tpl = state.templates.find(x => x.name === selected);
  if (!tpl) return;

  main.innerHTML = `
    <div class="preview-header">
      <span class="title">${esc(tpl.name)}.html</span>
      <span class="badge">${esc(tpl.features[0] || t('template'))}</span>
      <span style="margin-inline-start:auto;font-size:10px;color:var(--dim)">${tpl.placeholders.length} placeholders &middot; ${tpl.lines} lines</span>
    </div>
    <div class="preview-tabs">
      <button class="preview-tab ${activeTab === 'source' ? 'active' : ''}" onclick="switchTab('source')">Source</button>
      <button class="preview-tab ${activeTab === 'preview' ? 'active' : ''}" onclick="switchTab('preview')">Preview</button>
      <button class="preview-tab ${activeTab === 'info' ? 'active' : ''}" onclick="switchTab('info')">Info</button>
    </div>
    <div class="preview-content" id="previewContent"></div>
  `;

  loadTabContent();
}

async function loadTabContent() {
  const container = document.getElementById('previewContent');
  if (!selected || !container) return;

  if (activeTab === 'source') {
    try {
      const resp = await fetch('/api/template?name=' + encodeURIComponent(selected));
      const text = await resp.text();
      container.innerHTML = `<div class="source-view">${highlightHTML(text)}</div>`;
    } catch {
      container.innerHTML = '<div class="source-view">' + t('failed to load') + '</div>';
    }
  } else if (activeTab === 'preview') {
    try {
      const resp = await fetch('/api/template?name=' + encodeURIComponent(selected));
      let text = await resp.text();
      // Replace placeholders with sample content
      text = text.replace(/\{\{TITLE\}\}/g, 'Sample Title');
      text = text.replace(/\{\{SUBTITLE\}\}/g, 'A sample subtitle for preview');
      text = text.replace(/\{\{[A-Z_]+\}\}/g, '...');
      const blob = new Blob([text], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      container.innerHTML = `<iframe class="render-frame" src="${url}"></iframe>`;
    } catch {
      container.innerHTML = '<div class="preview-empty"><div class="text">' + t('preview failed') + '</div></div>';
    }
  } else if (activeTab === 'info') {
    const tpl = state.templates.find(x => x.name === selected);
    if (!tpl) return;
    container.innerHTML = `<div class="info-panel">
      <h3>${t('Template Details')}</h3>
      <div class="info-row"><span class="label">${t('File')}</span><span class="value">${esc(tpl.file)}</span></div>
      <div class="info-row"><span class="label">${t('Lines')}</span><span class="value">${tpl.lines}</span></div>
      <div class="info-row"><span class="label">${t('Size')}</span><span class="value">${formatBytes(tpl.size)}</span></div>
      <div class="info-row"><span class="label">${t('Features')}</span><span class="value">${tpl.features.join(', ') || t('none')}</span></div>
      <h3 style="margin-top:24px">${t('Placeholders')}</h3>
      <div class="placeholder-list">
        ${tpl.placeholders.map(p => `<span class="placeholder-tag">${esc(p)}</span>`).join('')}
      </div>
      ${tpl.description ? `<h3 style="margin-top:24px">${t('Description')}</h3><p style="font-size:12px;color:var(--muted);line-height:1.6;">${esc(tpl.description)}</p>` : ''}
    </div>`;
  }
}

function highlightHTML(text) {
  const lines = text.split('\n');
  return lines.map((line, i) => {
    let highlighted = esc(line);
    // Highlight placeholders
    highlighted = highlighted.replace(/(\{\{[A-Z_]+\}\})/g, '<span class="placeholder">$1</span>');
    // Highlight HTML comments
    highlighted = highlighted.replace(/(&lt;!--.*?--&gt;)/g, '<span class="comment">$1</span>');
    return `<span class="line-num">${i + 1}</span>${highlighted}`;
  }).join('\n');
}

function selectTemplate(name) {
  selected = name;
  activeTab = 'source';
  render();
}

function switchTab(tab) {
  activeTab = tab;
  const tabs = document.querySelectorAll('.preview-tab');
  tabs.forEach(tb => tb.classList.toggle('active', tb.textContent.toLowerCase() === tab));
  loadTabContent();
}

// ── Mobile panel switching ──
function switchMobilePanel(panel) {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main-content');
  const tabs = document.querySelectorAll('.mobile-tab');

  sidebar.classList.remove('mobile-visible');
  main.classList.remove('mobile-hidden');

  tabs.forEach(tb => tb.classList.toggle('active', tb.dataset.panel === panel));

  if (panel === 'templates') {
    sidebar.classList.add('mobile-visible');
    main.classList.add('mobile-hidden');
  }
}

// ── Keyboard navigation ──
const barnPanels = ['.sidebar', '.main'];
let barnActivePanel = 1;
function switchBarnPanel(dir) {
  barnActivePanel = (barnActivePanel + dir + barnPanels.length) % barnPanels.length;
  const el = document.querySelector(barnPanels[barnActivePanel]);
  if (el) { el.setAttribute('tabindex', '-1'); el.focus(); }
}
document.addEventListener('keydown', (e) => {
  if (e.key === '[' && !e.target.matches('input,textarea')) { e.preventDefault(); switchBarnPanel(-1); }
  if (e.key === ']' && !e.target.matches('input,textarea')) { e.preventDefault(); switchBarnPanel(1); }
  if (e.key === 'Escape') { selected = null; activeTab = 'source'; render(); }
});

// ── Init ──
connect();
</script>
