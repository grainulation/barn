<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>barn</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0e1a'/><path d='M32,3.84 L18.18,3.84 C8.04,13.98 8.04,45.52 18.18,60.16 L32,60.16' fill='none' stroke='%23e11d48' stroke-width='1.28' stroke-linecap='round' stroke-linejoin='round'/><text x='32' y='33' text-anchor='middle' dominant-baseline='central' fill='%23e11d48' font-family='-apple-system,system-ui,sans-serif' font-size='24' font-weight='700'>B</text></svg>">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1e293b;
    --border: rgba(255,255,255,0.08);
    --accent: #f43f5e;
    --accent-light: #fb7185;
    --accent-dim: rgba(225,29,72,0.12);
    --text: #e8ecf1;
    --muted: #94a3b8;
    --dim: #7c8db0;
    --green: #22c55e;
    --orange: #f59e0b;
    --purple: #a78bfa;
    --blue: #3b82f6;
    --blue-light: #60a5fa;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout: two columns ── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  /* ── Toolbar ── */
  .toolbar {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
  }
  .toolbar-brand {
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .toolbar-sprint {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg3);
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .toolbar-sprint .phase {
    color: var(--blue-light);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 9px;
    letter-spacing: 0.06em;
    margin-inline-end: 6px;
  }
  .toolbar-count {
    font-size: 11px;
    color: var(--dim);
    margin-inline-start: auto;
  }
  .toolbar-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .toolbar-refresh:hover { color: var(--text); border-color: var(--muted); }

  /* ── Sidebar (template list) ── */
  .sidebar {
    background: var(--bg2);
    border-inline-end: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
  }

  .sidebar-header {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    padding: 8px 8px 6px;
  }

  .template-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .template-card:hover { border-color: var(--accent-dim); background: rgba(225,29,72,0.04); }
  .template-card.active { border-color: var(--accent); background: rgba(225,29,72,0.06); }
  .template-card .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .template-card .desc {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .template-card .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .template-card .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg2);
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .template-card .tag.feature { color: var(--blue-light); background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.15); cursor: pointer; }
  .template-card .tag.feature:hover { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.3); }
  .template-card .tag.feature.active-filter { background: rgba(59,130,246,0.25); border-color: var(--blue-light); }

  /* ── Search input ── */
  .search-wrapper {
    padding: 0 0 8px;
  }
  .search-wrapper label {
    display: block;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    padding: 0 8px 4px;
  }
  .search-input {
    width: 100%;
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--dim); }
  .search-input:focus { border-color: var(--accent); }
  .search-count {
    font-size: 10px;
    color: var(--dim);
    padding: 4px 8px 0;
  }

  /* ── Sprint section ── */
  .sprint-section {
    margin-top: 8px;
  }
  .sprint-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 6px;
  }
  .sprint-card.active { border-inline-start: 3px solid var(--green); }
  .sprint-card .sprint-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }
  .sprint-card .sprint-meta {
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }
  .sprint-card .sprint-meta .phase-tag {
    color: var(--blue-light);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── Main (preview) ── */
  .main {
    overflow-y: auto;
    background: var(--bg);
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--dim);
    gap: 8px;
  }
  .preview-empty .icon { font-size: 40px; opacity: 0.3; }
  .preview-empty .text { font-size: 13px; }

  .preview-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .preview-header .title { font-size: 15px; font-weight: 700; }
  .preview-header .badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--accent-dim);
    color: var(--accent-light);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .preview-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 24px;
  }
  .preview-tab {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    background: none;
    border-top: none;
    border-inline-start: none;
    border-inline-end: none;
  }
  .preview-tab:hover { color: var(--muted); }
  .preview-tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

  .preview-content {
    padding: 0;
    height: calc(100vh - 48px - 56px - 36px);
  }

  /* Source view */
  .source-view {
    padding: 20px 24px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--muted);
    white-space: pre-wrap;
    overflow-y: auto;
    height: 100%;
    tab-size: 2;
  }
  .source-view .line-num {
    display: inline-block;
    width: 36px;
    text-align: end;
    color: var(--dim);
    margin-inline-end: 16px;
    user-select: none;
    opacity: 0.5;
  }
  .source-view .placeholder { color: var(--orange); font-weight: 600; }
  .source-view .comment { color: var(--dim); font-style: italic; }
  .source-view .tag { color: var(--accent-light); }
  .source-view .attr { color: var(--purple); }
  .source-view .str { color: var(--green); }

  /* Rendered preview */
  .render-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  /* Info panel */
  .info-panel {
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }
  .info-panel h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .info-row .label { color: var(--dim); }
  .info-row .value { color: var(--text); font-weight: 500; }
  .placeholder-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .placeholder-tag {
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    background: rgba(245,158,11,0.1);
    color: var(--orange);
    border-radius: 4px;
    border: 1px solid rgba(245,158,11,0.2);
  }

  /* ── Connection indicator ── */
  .conn-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .conn-dot.disconnected { background: var(--accent); }
  .reconnect-banner { position:fixed;top:0;left:0;right:0;z-index:9999;padding:8px 16px;background:#92400e;color:#fbbf24;font-size:12px;text-align:center;transform:translateY(-100%);transition:transform .3s;font-family:system-ui,sans-serif }
  .reconnect-banner.visible { transform:translateY(0) }
  .reconnect-banner button { background:none;border:1px solid #fbbf24;color:#fbbf24;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin-inline-start:8px }

  /* ── Mobile nav ── */
  .mobile-nav {
    display: none;
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .mobile-nav-bar {
    display: flex;
  }
  .mobile-tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
  }
  .mobile-tab:hover { color: var(--muted); }
  .mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── A11y ── */
  .skip-link{position:absolute;top:-40px;inset-inline-start:0;background:var(--accent);color:#fff;padding:8px 16px;z-index:10000;font-size:14px;font-weight:600;transition:top .2s}
  .skip-link:focus{top:0}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }
  :focus-visible {
    outline: 2px solid #6ea8fe;
    outline-offset: 2px;
  }
  :focus:not(:focus-visible) {
    outline: none;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 48px auto 1fr;
    }
    .mobile-nav { display: block; grid-row: 2; }
    .sidebar { grid-row: 3; display: none; }
    .main { grid-row: 3; }
    .sidebar.mobile-visible { display: block; }
    .main.mobile-hidden { display: none; }
    .toolbar .toolbar-sprint { display: none; }
  }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="live-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<div class="reconnect-banner" id="reconnectBanner" role="status" aria-live="polite"></div>
<div class="app">
  <!-- Toolbar -->
  <header class="toolbar" role="banner">
    <span class="toolbar-brand"><svg width="57" height="44" viewBox="0 0 62 38" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle"><path d="M22,8 L16,8 C10.5,12.5 10.5,25.5 16,30 L22,30" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><text x="22.5" y="19" text-anchor="middle" dominant-baseline="central" fill="#e11d48" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="800">B</text><text x="28.5" y="19" dominant-baseline="central" fill="#e8ecf1" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="800">arn</text></svg></span>
    <span id="sprintBadge" class="toolbar-sprint" aria-label="Active sprint"></span>
    <span id="templateCount" class="toolbar-count" aria-label="Template count"></span>
    <button class="toolbar-refresh" onclick="refresh()">refresh</button>
    <span class="conn-dot" id="connDot" role="status" aria-label="Connection status"></span>
  </header>

  <!-- Mobile nav -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <div class="mobile-nav-bar">
      <button class="mobile-tab active" data-panel="preview" onclick="switchMobilePanel('preview')">Preview</button>
      <button class="mobile-tab" data-panel="templates" onclick="switchMobilePanel('templates')">Templates</button>
    </div>
  </nav>

  <!-- Sidebar: template list + sprints -->
  <aside class="sidebar" id="sidebar" role="complementary" aria-label="Sidebar"></aside>

  <!-- Main: preview pane -->
  <main class="main" id="main-content" aria-label="Barn workspace">
    <div class="preview-empty">
      <div class="icon" aria-hidden="true">B</div>
      <div class="text" id="preview-empty-text">select a template to preview</div>
    </div>
  </main>
  <footer style="display:flex;align-items:center;justify-content:space-between;padding:4px 24px;border-top:1px solid var(--border);background:var(--bg2);font-size:9px;color:var(--dim)">
    <span>barn v1.0.0 -- @grainulation/barn</span>
    <div style="display:flex;gap:16px">
      <a href="http://localhost:9091" style="color:var(--dim);text-decoration:none">wheat</a>
      <a href="http://localhost:9094" style="color:var(--dim);text-decoration:none">mill</a>
      <a href="http://localhost:9095" style="color:var(--dim);text-decoration:none">silo</a>
      <a href="http://localhost:9090" style="color:var(--dim);text-decoration:none">farmer</a>
      <a href="http://localhost:9096" style="color:var(--dim);text-decoration:none">harvest</a>
      <span style="color:var(--border)">&middot;</span>
      <a href="https://github.com/grainulation/barn" target="_blank" rel="noopener noreferrer" style="color:var(--dim);text-decoration:none">github</a>
    </div>
  </footer>
</div>

<script>
// ── i18n passthrough ──
const t = (s, v) => v ? s.replace(/\{(\w+)\}/g, (_, k) => v[k] ?? k) : s;

let state = { templates: [], sprints: [], activeSprint: null, manifest: null };
let selected = null;
let activeTab = 'source';
let sse = null;
let searchQuery = '';
let activeTagFilter = null;

// ── SSE connection ──────────────────────────────────────────────────────────

let retryCount = 0;
function showBanner(count) {
  const b = document.getElementById('reconnectBanner');
  if (count > 5) {
    b.textContent = '';
    b.appendChild(document.createTextNode(t('Connection lost.') + ' '));
    const btn = document.createElement('button');
    btn.textContent = t('Retry now');
    btn.addEventListener('click', () => { retryCount = 0; connect(); });
    b.appendChild(btn);
  } else if (count > 1) {
    b.textContent = t('Reconnecting (attempt {count})...', { count });
  } else {
    b.textContent = t('Reconnecting...');
  }
  b.classList.add('visible');
}
function hideBanner() { document.getElementById('reconnectBanner').classList.remove('visible'); }

function connect() {
  sse = new EventSource('/events');
  sse.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        state = msg.data;
        render();
        const ls = document.getElementById('live-status');
        if (ls) ls.textContent = t('Updated: {count} templates loaded', { count: (state.templates || []).length });
      }
    } catch {}
  };
  sse.onopen = () => {
    retryCount = 0;
    hideBanner();
    document.getElementById('connDot').classList.remove('disconnected'); document.getElementById('connDot').setAttribute('aria-label', 'Connected');
  };
  sse.onerror = () => {
    document.getElementById('connDot').classList.add('disconnected'); document.getElementById('connDot').setAttribute('aria-label', 'Disconnected');
    sse.close();
    const delay = Math.min(30000, 1000 * Math.pow(2, retryCount)) + Math.random() * 1000;
    retryCount++;
    showBanner(retryCount);
    setTimeout(connect, delay);
  };
}

async function refresh() {
  try {
    const resp = await fetch('/api/refresh', { method: 'POST' });
    state = await resp.json();
    render();
  } catch {}
}

// ── Rendering ───────────────────────────────────────────────────────────────

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(1) + ' KB';
}

function render() {
  renderToolbar();
  renderSidebar();
  renderMain();
}

function renderToolbar() {
  const badge = document.getElementById('sprintBadge');
  if (state.activeSprint) {
    const s = state.activeSprint;
    badge.innerHTML = `<span class="phase">${esc(s.phase)}</span>${esc(s.name || s.question || '').substring(0, 50)}`;
  } else {
    badge.textContent = t('no active sprint');
  }
  const filtered = getFilteredTemplates();
  const total = state.templates.length;
  const shown = filtered.length;
  if (searchQuery || activeTagFilter) {
    document.getElementById('templateCount').textContent = t('{shown} of {total} templates', { shown, total });
  } else {
    document.getElementById('templateCount').textContent = t('{count} templates', { count: total });
  }
}

function getFilteredTemplates() {
  const q = searchQuery.toLowerCase();
  return state.templates.filter(tpl => {
    // Tag filter
    if (activeTagFilter) {
      const allTags = [...(tpl.features || []), ...(tpl.tags || [])];
      if (!allTags.some(tag => tag.toLowerCase() === activeTagFilter.toLowerCase())) return false;
    }
    // Text search
    if (!q) return true;
    const haystack = [
      tpl.name,
      tpl.title || '',
      tpl.description || '',
      ...(tpl.placeholders || []),
      ...(tpl.features || []),
      ...(tpl.tags || []),
    ].join(' ').toLowerCase();
    return haystack.includes(q);
  });
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const filtered = getFilteredTemplates();
  const total = state.templates.length;
  const shown = filtered.length;
  const isFiltered = searchQuery || activeTagFilter;

  let html = '<div class="search-wrapper">'
    + '<label for="template-search">' + t('Templates') + '</label>'
    + '<input type="search" id="template-search" class="search-input" placeholder="' + t('Filter templates...') + '" value="' + esc(searchQuery) + '" aria-describedby="search-count">'
    + '</div>';

  if (isFiltered) {
    html += '<div class="search-count" id="search-count" role="status">' + t('{shown} of {total} templates', { shown, total });
    if (activeTagFilter) {
      html += ' <span style="color:var(--blue-light)">[' + esc(activeTagFilter) + ']</span>'
        + ' <button data-action="clear-tag" style="background:none;border:none;color:var(--accent-light);cursor:pointer;font-size:10px;font-family:inherit;padding:0;margin-inline-start:4px">clear</button>';
    }
    html += '</div>';
  } else {
    html += '<div class="search-count" id="search-count" role="status">' + t('{total} templates', { total }) + '</div>';
  }

  if (filtered.length === 0) {
    const msg = total === 0
      ? t('No templates found. Add .html files to the templates/ directory.')
      : t('No templates match your filter.');
    html += '<div style="text-align:center;color:var(--muted);font-size:12px;padding:24px 12px;line-height:1.5">' + msg + '</div>';
  }

  for (const tpl of filtered) {
    const isActive = selected === tpl.name;
    const allTags = [...(tpl.features || []), ...(tpl.tags || [])];
    html += `<div class="template-card ${isActive ? 'active' : ''}" data-template="${esc(tpl.name)}" tabindex="0" role="button" aria-pressed="${isActive}" aria-label="${esc(tpl.name)}" ${isActive ? 'aria-current="true"' : ''}>
      <div class="name">${esc(tpl.title || tpl.name)}</div>
      ${tpl.description ? `<div class="desc">${esc(tpl.description)}</div>` : ''}
      <div class="meta">
        <span class="tag">${esc(tpl.lines)} lines</span>
        <span class="tag">${formatBytes(tpl.size)}</span>
        ${allTags.map(f => `<span class="tag feature${activeTagFilter && f.toLowerCase() === activeTagFilter.toLowerCase() ? ' active-filter' : ''}" data-filter-tag="${esc(f)}">${esc(f)}</span>`).join('')}
      </div>
    </div>`;
  }

  if (state.sprints.length > 0) {
    html += '<h2 class="sidebar-header" style="margin-top:16px">' + t('Sprints') + '</h2>';
    for (const s of state.sprints) {
      const isActive = s.status === 'active';
      html += `<div class="sprint-card ${isActive ? 'active' : ''}">
        <div class="sprint-name">${esc(s.name || 'unnamed')}</div>
        <div class="sprint-meta">
          <span class="phase-tag">${esc(s.phase)}</span>
          <span>${esc(s.claims_count || 0)} claims</span>
        </div>
      </div>`;
    }
  }

  sidebar.innerHTML = html;

  // Announce filter results to screen readers
  if (isFiltered) {
    const ls = document.getElementById('live-status');
    if (ls) ls.textContent = t('{shown} of {total} templates shown', { shown, total });
  }

  // Re-attach search input listener (sidebar innerHTML was replaced)
  const input = document.getElementById('template-search');
  if (input) {
    input.addEventListener('input', onSearchInput);
    // Restore cursor position: place at end
    if (document.activeElement && document.activeElement.id === 'template-search') {
      input.focus();
      input.selectionStart = input.selectionEnd = input.value.length;
    }
  }
}

function onSearchInput(e) {
  searchQuery = e.target.value;
  // Re-render sidebar only (preserve main pane)
  renderSidebar();
  // Keep focus on input after re-render
  const input = document.getElementById('template-search');
  if (input) { input.focus(); input.selectionStart = input.selectionEnd = input.value.length; }
}

function filterByTag(tag) {
  if (activeTagFilter && activeTagFilter.toLowerCase() === tag.toLowerCase()) {
    activeTagFilter = null;
  } else {
    activeTagFilter = tag;
  }
  renderSidebar();
}

function clearTagFilter() {
  activeTagFilter = null;
  renderSidebar();
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (!selected) {
    main.innerHTML = `<div class="preview-empty">
      <div class="icon" aria-hidden="true">B</div>
      <div class="text">${t('select a template to preview')}</div>
    </div>`;
    return;
  }

  const tpl = state.templates.find(x => x.name === selected);
  if (!tpl) return;

  main.innerHTML = `
    <div class="preview-header">
      <span class="title">${esc(tpl.name)}.html</span>
      <span class="badge">${esc(tpl.features[0] || t('template'))}</span>
      <span style="margin-inline-start:auto;font-size:10px;color:var(--dim)">${esc(tpl.placeholders.length)} placeholders &middot; ${esc(tpl.lines)} lines</span>
    </div>
    <div class="preview-tabs" role="tablist" aria-label="Template view tabs">
      <button class="preview-tab ${activeTab === 'source' ? 'active' : ''}" data-tab="source" role="tab" id="tab-source" aria-selected="${activeTab === 'source'}" aria-controls="previewContent">Source</button>
      <button class="preview-tab ${activeTab === 'preview' ? 'active' : ''}" data-tab="preview" role="tab" id="tab-preview" aria-selected="${activeTab === 'preview'}" aria-controls="previewContent">Preview</button>
      <button class="preview-tab ${activeTab === 'info' ? 'active' : ''}" data-tab="info" role="tab" id="tab-info" aria-selected="${activeTab === 'info'}" aria-controls="previewContent">Info</button>
    </div>
    <div class="preview-content" id="previewContent" role="tabpanel" aria-labelledby="tab-${activeTab}"></div>
  `;

  loadTabContent();
}

async function loadTabContent() {
  const container = document.getElementById('previewContent');
  if (!selected || !container) return;

  if (activeTab === 'source') {
    try {
      const resp = await fetch('/api/template?name=' + encodeURIComponent(selected));
      const text = await resp.text();
      container.innerHTML = `<div class="source-view">${highlightHTML(text)}</div>`;
    } catch {
      container.innerHTML = '<div class="source-view">' + t('failed to load') + '</div>';
    }
  } else if (activeTab === 'preview') {
    try {
      const resp = await fetch('/api/template?name=' + encodeURIComponent(selected));
      let text = await resp.text();
      // Replace placeholders with sample content
      text = text.replace(/\{\{TITLE\}\}/g, 'Sample Title');
      text = text.replace(/\{\{SUBTITLE\}\}/g, 'A sample subtitle for preview');
      text = text.replace(/\{\{[A-Z_]+\}\}/g, '...');
      const blob = new Blob([text], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      container.innerHTML = `<iframe class="render-frame" sandbox="allow-same-origin" title="Template preview" src="${url}"></iframe>`;
    } catch {
      container.innerHTML = '<div class="preview-empty"><div class="text">' + t('preview failed') + '</div></div>';
    }
  } else if (activeTab === 'info') {
    const tpl = state.templates.find(x => x.name === selected);
    if (!tpl) return;
    container.innerHTML = `<div class="info-panel">
      <h3>${t('Template Details')}</h3>
      <div class="info-row"><span class="label">${t('File')}</span><span class="value">${esc(tpl.file)}</span></div>
      <div class="info-row"><span class="label">${t('Lines')}</span><span class="value">${esc(tpl.lines)}</span></div>
      <div class="info-row"><span class="label">${t('Size')}</span><span class="value">${formatBytes(tpl.size)}</span></div>
      <div class="info-row"><span class="label">${t('Features')}</span><span class="value">${tpl.features.map(f => esc(f)).join(', ') || t('none')}</span></div>
      <h3 style="margin-top:24px">${t('Placeholders')}</h3>
      <div class="placeholder-list">
        ${tpl.placeholders.map(p => `<span class="placeholder-tag">${esc(p)}</span>`).join('')}
      </div>
      ${tpl.description ? `<h3 style="margin-top:24px">${t('Description')}</h3><p style="font-size:12px;color:var(--muted);line-height:1.6;">${esc(tpl.description)}</p>` : ''}
    </div>`;
  }

  // F3: Focus management after tab switch
  container.setAttribute('tabindex', '-1');
  container.focus();
}

function highlightHTML(text) {
  const lines = text.split('\n');
  return lines.map((line, i) => {
    let highlighted = esc(line);
    // Highlight placeholders
    highlighted = highlighted.replace(/(\{\{[A-Z_]+\}\})/g, '<span class="placeholder">$1</span>');
    // Highlight HTML comments
    highlighted = highlighted.replace(/(&lt;!--.*?--&gt;)/g, '<span class="comment">$1</span>');
    return `<span class="line-num">${i + 1}</span>${highlighted}`;
  }).join('\n');
}

function selectTemplate(name) {
  selected = name;
  activeTab = 'source';
  render();
  // On mobile, switch to Preview panel so the user sees the selected template
  const mobileNav = document.querySelector('.mobile-nav');
  if (mobileNav && mobileNav.offsetHeight > 0) {
    switchMobilePanel('preview');
  }
  // F2: Focus management after render — focus the first tab button
  const firstTab = document.getElementById('tab-source');
  if (firstTab) firstTab.focus();
}

function switchTab(tab) {
  activeTab = tab;
  const tabs = document.querySelectorAll('.preview-tab');
  tabs.forEach(tb => {
    const isActive = (tb.dataset.tab || tb.textContent.toLowerCase()) === tab;
    tb.classList.toggle('active', isActive);
    tb.setAttribute('aria-selected', String(isActive));
  });
  // Update tabpanel aria-labelledby
  const panel = document.getElementById('previewContent');
  if (panel) panel.setAttribute('aria-labelledby', 'tab-' + tab);
  loadTabContent();
}

// ── Mobile panel switching ──
function switchMobilePanel(panel) {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main-content');
  const tabs = document.querySelectorAll('.mobile-tab');

  sidebar.classList.remove('mobile-visible');
  main.classList.remove('mobile-hidden');

  tabs.forEach(tb => tb.classList.toggle('active', tb.dataset.panel === panel));

  if (panel === 'templates') {
    sidebar.classList.add('mobile-visible');
    main.classList.add('mobile-hidden');
  }
}

// ── Keyboard navigation ──
const barnPanels = ['.sidebar', '.main'];
let barnActivePanel = 1;
function switchBarnPanel(dir) {
  barnActivePanel = (barnActivePanel + dir + barnPanels.length) % barnPanels.length;
  const el = document.querySelector(barnPanels[barnActivePanel]);
  if (el) { el.setAttribute('tabindex', '-1'); el.focus(); }
}
document.addEventListener('keydown', (e) => {
  if (e.key === '[' && !e.target.matches('input,textarea')) { e.preventDefault(); switchBarnPanel(-1); }
  if (e.key === ']' && !e.target.matches('input,textarea')) { e.preventDefault(); switchBarnPanel(1); }
  if (e.key === 'Escape') {
    if (searchQuery || activeTagFilter) {
      searchQuery = '';
      activeTagFilter = null;
      render();
    } else {
      selected = null;
      activeTab = 'source';
      render();
    }
  }

  // K7: Arrow key navigation for sidebar template cards
  if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && !e.target.matches('input,textarea')) {
    const cards = Array.from(document.querySelectorAll('#sidebar [data-template]'));
    if (cards.length === 0) return;
    const idx = cards.indexOf(document.activeElement);
    if (idx === -1 && e.key === 'ArrowDown') {
      cards[0].focus();
      e.preventDefault();
    } else if (idx >= 0) {
      e.preventDefault();
      const next = e.key === 'ArrowDown' ? Math.min(idx + 1, cards.length - 1) : Math.max(idx - 1, 0);
      cards[next].focus();
    }
  }
});

// ── Event delegation ──
document.getElementById('sidebar').addEventListener('click', (e) => {
  // Clear tag filter
  if (e.target.closest('[data-action="clear-tag"]')) {
    e.stopPropagation();
    clearTagFilter();
    return;
  }
  // Tag filter click (handle before template selection)
  const tagEl = e.target.closest('[data-filter-tag]');
  if (tagEl) {
    e.stopPropagation();
    filterByTag(tagEl.dataset.filterTag);
    return;
  }
  const card = e.target.closest('[data-template]');
  if (card) selectTemplate(card.dataset.template);
});

// K1: Keyboard access for template cards (Enter/Space)
document.getElementById('sidebar').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    const card = e.target.closest('[data-template]');
    if (card) {
      e.preventDefault();
      selectTemplate(card.dataset.template);
    }
  }
});

document.getElementById('main-content').addEventListener('click', (e) => {
  const tab = e.target.closest('[data-tab]');
  if (tab) switchTab(tab.dataset.tab);
});

// ── Init ──
connect();
</script>
</body>
</html>
